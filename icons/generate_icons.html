<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Open this file in a browser, right-click each canvas, and "Save image as" to create the PNG icons.</p>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");
  // Background circle
  ctx.fillStyle = "#4f8cff";
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2, 0, Math.PI * 2);
  ctx.fill();
  // Speaker icon (white)
  ctx.fillStyle = "#fff";
  const u = s / 16;
  ctx.fillRect(3*u, 5.5*u, 3*u, 5*u);
  ctx.beginPath();
  ctx.moveTo(6*u, 5.5*u);
  ctx.lineTo(9*u, 3*u);
  ctx.lineTo(9*u, 13*u);
  ctx.lineTo(6*u, 10.5*u);
  ctx.fill();
  // Arrow (skip-next indicator)
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = Math.max(1, u * 1.2);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(10.5*u, 5*u);
  ctx.lineTo(13*u, 8*u);
  ctx.lineTo(10.5*u, 11*u);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(13*u, 8*u);
  ctx.lineTo(13*u, 8*u);
  ctx.stroke();
}
["c16","c48","c128"].forEach(id => drawIcon(document.getElementById(id)));
</script>
</body>
</html>
